<!DOCTYPE html>
<!-- Le dice al navegador que el documento usa HTML5. Va siempre al inicio.  -->

<html lang="en">
    <!--Elemento raíz que envuelve todo el contenido. lang="en" indica el idioma  -->
<head>
    <!-- Contiene información del documento que no se muestra en pantalla -->
    <meta charset="UTF-8">
    <!--  Define la codificación de caracteres. UTF-8 permite usar tildes, ñ, emojis, etc. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--  Controla cómo se ve la página en móviles adapta el ancho al dispositivo.-->
    <title>Document</title>
    <!--  Texto que aparece en la pestaña del navegador -->
</head>
<body>
    <!--  Contiene todo lo que sí se muestra en pantalla: textos, imágenes, botones, etc. -->
      <h1><a href="/practica3.html">volver</a></h1>
</body>
</html>
