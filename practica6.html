<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- La etiqueta table se utiliza para definir tablas en HTML. Todo el contenido de la tabla incluidas las filas y las celdas se coloca dentro de esta etiqueta -->

    <!-- La etiqueta td define una serie de datos dentro de una fila. Cada etiqueta td presenta una columna en la tabla -->

    <!-- La etiqueta th define una celda de encabezado dentro de una fila. Cada etiqueta th representa un encabezado de columna en la tabla -->

    <table border="1"><!-- etiqueta de apertura -->


<tr>
    <th>Encabezado 1</th>
    <th>Encabezado 2</th>
    <th>Encabezado 3</th>
</tr>


<tr>
<td>Dato 1</td>
<td>Dato 2</td>
<td>Dato 3</td>
</tr>

<tr>
<td>Dato 4</td>
<td>Dato 5</td>
<td>Dato 6</td>

    </table> <!-- etiqueta de cierre -->
    <br>
    <br>
    <table border="1">


        <caption>Paises y Capitales</caption>
        <tr>
            <th>País</th>
            <th>Capital</th>
        </tr>


        <tr>
            <td>España</td>
            <td>Madrid</td>
        </tr>


        <tr>
            <td>Francia</td>
            <td>París</td>
        </tr>


        <tr>
            <td>Italia</td>
            <td>Roma</td>
        </tr>
    </table>
    <br>
    <br>
    <table border="1">
        <tr>
            <th colspan="4">Mundial de Fútbol</th>
        </tr>


        <tr>
            <td rowspan="3">Paises con mayoría de goles</td>
            <td>Brasil 2</td> <td>230</td>
        </tr>


        <tr>
            <td>Alemania</td> <td>180</td>
        </tr>


        <tr>
            <td>Argentina</td> <td>150</td>
        </tr>
    </table>
<body>
</html>
